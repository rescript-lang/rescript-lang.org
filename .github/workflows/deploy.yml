name: Deploy to Cloudflare Pages
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: "Choose an environment to deploy to: <preview|production>"
        required: true
        default: "preview"
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: ".node-version"
          cache: "yarn"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: yarn install
      - name: Sync playground bundles
        run: yarn build:sync-bundles
      - name: Set VITE_DEPLOYMENT_URL
        shell: bash
        run: |
          RAW_BRANCH="${{ github.head_ref || github.ref_name }}"

          if [[ "$RAW_BRANCH" == "master" ]]; then
             echo "VITE_DEPLOYMENT_URL=" >> "$GITHUB_ENV"
          else
             SAFE_BRANCH="${RAW_BRANCH//\//-}"

             SAFE_BRANCH=$(echo "$SAFE_BRANCH" | tr '[:upper:]' '[:lower:]')

             echo "SAFE_BRANCH=$SAFE_BRANCH" >> "$GITHUB_ENV"
             echo "VITE_DEPLOYMENT_URL=https://${SAFE_BRANCH}.rescript-lang.pages.dev" >> "$GITHUB_ENV"
          fi
      - name: Set Algolia env
        shell: bash
        env:
          VITE_ALGOLIA_APP_ID: ${{ vars.VITE_ALGOLIA_APP_ID || secrets.VITE_ALGOLIA_APP_ID }}
          VITE_ALGOLIA_INDEX_NAME: ${{ vars.VITE_ALGOLIA_INDEX_NAME || secrets.VITE_ALGOLIA_INDEX_NAME }}
          VITE_ALGOLIA_SEARCH_API_KEY: ${{ vars.VITE_ALGOLIA_SEARCH_API_KEY || secrets.VITE_ALGOLIA_SEARCH_API_KEY }}
        run: |
          missing=()

          if [[ -z "$VITE_ALGOLIA_APP_ID" ]]; then
            missing+=("VITE_ALGOLIA_APP_ID")
          fi

          if [[ -z "$VITE_ALGOLIA_INDEX_NAME" ]]; then
            missing+=("VITE_ALGOLIA_INDEX_NAME")
          fi

          if [[ -z "$VITE_ALGOLIA_SEARCH_API_KEY" ]]; then
            missing+=("VITE_ALGOLIA_SEARCH_API_KEY")
          fi

          if (( ${#missing[@]} > 0 )); then
            echo "Missing Algolia public deploy env: ${missing[*]}" >&2
            exit 1
          fi

          echo "VITE_ALGOLIA_APP_ID=$VITE_ALGOLIA_APP_ID" >> "$GITHUB_ENV"
          echo "VITE_ALGOLIA_INDEX_NAME=$VITE_ALGOLIA_INDEX_NAME" >> "$GITHUB_ENV"
          echo "VITE_ALGOLIA_SEARCH_API_KEY=$VITE_ALGOLIA_SEARCH_API_KEY" >> "$GITHUB_ENV"
      - name: Build
        run: yarn build
        env:
          VITE_DEPLOYMENT_URL: ${{ env.VITE_DEPLOYMENT_URL }}
      - name: Deploy
        if: ${{ github.actor != 'dependabot[bot]' }}
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=rescript-lang-org --branch=${{ env.SAFE_BRANCH }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: 4.63.0
        env:
          FORCE_COLOR: 0
      - name: Comment PR with deployment link
        if: ${{ github.actor != 'dependabot[bot]' }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          header: deploymemt
          message: |
            ## Cloudflare deployment
            Deployement ID: ${{ steps.deploy.outputs.pages-deployment-id }}
            Deployment Environment: ${{ steps.deploy.outputs.pages-environment }}

            ${{ steps.deploy.outputs.command-output }}

  e2e:
    runs-on: ubuntu-latest
    name: E2E Tests
    needs: deploy
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: ".node-version"
          cache: "yarn"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: yarn install
      - name: Build ReScript
        run: yarn build:res
      - name: Cypress E2E tests
        uses: cypress-io/github-action@v7
        with:
          install: false
          browser: chrome
          config: baseUrl=${{ needs.deploy.outputs.deployment-url }}
